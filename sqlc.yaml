version: "2"
sql:
  - engine: "mysql"
    queries: "./store/queries"
    schema: "./store/schema"
    strict_function_checks: true
    database:
      uri: "${DB_USERNAME}:${DB_PASSWORD}@tcp(${DB_HOST}:3306)/${DB_NAME}"
    gen:
      go:
        package: "store"
        out: "./store"
        overrides:
          - db_type: "varchar"
            go_type: "database/sql.Null[string]"
            nullable: true
          - db_type: "text"
            go_type: "database/sql.Null[string]"
            nullable: true
          - db_type: "double"
            go_type: "database/sql.Null[float64]"
            nullable: true
          - db_type: "varbinary"
            go_type: "database/sql.Null[[]byte]"
            nullable: true
          - db_type: "binary"
            go_type: "database/sql.Null[[]byte]"
            nullable: true
          - db_type: "datetime"
            go_type:
              import: "database/sql"
              type: "Null[time.Time]"
            nullable: true
