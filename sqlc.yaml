version: "2"
sql:
  - engine: "mysql"
    queries: "./store/queries/v2"
    schema: "./store/schema"
    database:
      uri: "${DB_USERNAME}:${DB_PASSWORD}@tcp(${DB_HOST}:3306)/${DB_NAME}"
    gen:
      go:
        package: "store"
        out: "./store/v2"
        rename:
          db_time: DBTime
        overrides:
          - db_type: "bool"
            go_type: "database/sql.Null[bool]"
            nullable: true
          - db_type: "tinyint"
            go_type: "database/sql.Null[bool]"
            nullable: true
          - db_type: "varchar"
            go_type: "database/sql.Null[string]"
            nullable: true
          - db_type: "char"
            go_type: "database/sql.Null[string]"
            nullable: true
          - db_type: "text"
            go_type: "database/sql.Null[string]"
            nullable: true
          - db_type: "double"
            go_type: "database/sql.Null[float64]"
            nullable: true
          - db_type: "varbinary"
            go_type: "database/sql.Null[[]byte]"
            nullable: true
          - db_type: "binary"
            go_type: "database/sql.Null[[]byte]"
            nullable: true
          - db_type: "bigint"
            go_type: "database/sql.Null[int64]"
            nullable: true
