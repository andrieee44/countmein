syntax = "proto3";

package users.v1;

service UserService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc UpdateLogin(UpdateLoginRequest) returns (UpdateLoginResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Revoke(RevokeRequest) returns (RevokeResponse);
  rpc RevokeAll(RevokeAllRequest) returns (RevokeAllResponse);
}

message CreateRequest {
  string email = 1;
  string first_name = 2 [json_name = "first_name"];
  string last_name = 3 [json_name = "last_name"];
  string password = 4;
  optional string middle_name = 5 [json_name = "middle_name"];
}

message CreateResponse {
  string session_id = 1 [json_name = "session_id"];
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string session_id = 1 [json_name = "session_id"];
}

message GetRequest {
  int32 id = 1;
}

message GetResponse {
  string email = 1;
  string first_name = 2 [json_name = "first_name"];
  string last_name = 3 [json_name = "last_name"];
  optional string middle_name = 4 [json_name = "middle_name"];
}

message UpdateRequest {
  optional string first_name = 1 [json_name = "first_name"];
  optional string last_name = 2 [json_name = "last_name"];
  optional string middle_name = 3 [json_name = "middle_name"];
}

message UpdateResponse {}

message UpdateLoginRequest {
  optional string email = 1;
  optional string password = 2;
}

message UpdateLoginResponse {}

message DeleteRequest {}

message DeleteResponse {}

message RevokeRequest {}

message RevokeResponse {}

message RevokeAllRequest {}

message RevokeAllResponse {}
