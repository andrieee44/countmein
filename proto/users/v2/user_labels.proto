syntax = "proto3";

package users.v2;

service UserLabelService {
  rpc CreateUserLabel(CreateUserLabelRequest) returns (CreateUserLabelResponse);
  rpc GetUserLabel(GetUserLabelRequest) returns (GetUserLabelResponse);
  rpc UpdateUserLabel(UpdateUserLabelRequest) returns (UpdateUserLabelResponse);
  rpc DeleteUserLabel(DeleteUserLabelRequest) returns (DeleteUserLabelResponse);
  rpc AttachUserLabel(AttachUserLabelRequest) returns (AttachUserLabelResponse);
  rpc DetachUserLabel(DetachUserLabelRequest) returns (DetachUserLabelResponse);
}

message CreateUserLabelRequest {
  string name = 1;
  string color = 2;
}

message CreateUserLabelResponse {
  int64 user_label_id = 1;
}

message GetUserLabelRequest {
  int64 user_label_id = 1;
}

message GetUserLabelResponse {
  string name = 1;
  string color = 2;
}

message UpdateUserLabelRequest {
  int64 user_label_id = 1;
  optional string name = 2;
  optional string color = 3;
}

message UpdateUserLabelResponse {}

message DeleteUserLabelRequest {
  int64 user_label_id = 1;
}

message DeleteUserLabelResponse {}

message AttachUserLabelRequest {
  int64 user_label_id = 1;
  int64 calendar_id = 2;
}

message AttachUserLabelResponse {}

message DetachUserLabelRequest {
  int64 user_label_id = 1;
  int64 calendar_id = 2;
}

message DetachUserLabelResponse {}
