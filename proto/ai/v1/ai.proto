syntax = "proto3";

package ai.v1;

service AIService {
  rpc ImageToICal(ImageToICalRequest) returns (ImageToICalResponse);
  rpc AnalyzeICal(AnalyzeICalRequest) returns (AnalyzeICalResponse);
}

message ImageToICalRequest {
  bytes image = 1;
}

message ImageToICalResponse {
  bytes ical = 1;
}

message AnalyzeICalRequest {
  bytes ical = 1;
}

message AnalyzeICalResponse {
  string analysis = 1;
}
