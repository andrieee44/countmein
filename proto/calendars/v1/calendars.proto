syntax = "proto3";

package calendars.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

service CalendarService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetOwned(GetOwnedRequest) returns (GetOwnedResponse);
  rpc GetSubscribed(GetSubscribedRequest) returns (GetSubscribedResponse);
  rpc Merge(MergeRequest) returns (MergeResponse);
  rpc Replace(ReplaceRequest) returns (ReplaceResponse);
  rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse);
  rpc UpdateSubscribedMetadata(UpdateSubscribedMetadataRequest) returns (UpdateSubscribedMetadataResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc CreateCode(CreateCodeRequest) returns (CreateCodeResponse);
  rpc GetCodeMetadata(GetCodeMetadataRequest) returns (GetCodeMetadataResponse);
  rpc GetCodes(GetCodesRequest) returns (GetCodesResponse);
  rpc DeleteCode(DeleteCodeRequest) returns (DeleteCodeResponse);
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse);
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
  rpc GetMembers(GetMembersRequest) returns (GetMembersResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc BanMember(BanMemberRequest) returns (BanMemberResponse);
  rpc GetBannedMembers(GetBannedMembersRequest) returns (GetBannedMembersResponse);
  rpc UnbanMember(UnbanMemberRequest) returns (UnbanMemberResponse);
}

message CreateRequest {
  string name = 1;
  bytes ical = 2;
  bool members_only = 3;
  string color = 4;
  optional string description = 5;
}

message CreateResponse {}

message GetRequest {
  int32 id = 1;
}

message GetResponse {
  int32 owner_id = 1;
  string name = 2;
  bytes ical = 3;
  bool members_only = 4;
  string color = 5;
  optional string description = 6;
}

message GetOwnedRequest {}

message GetOwnedResponse {
  repeated int32 ids = 1;
}

message GetSubscribedRequest {}

message GetSubscribedResponse {
  repeated int32 ids = 1;
}

message MergeRequest {
  int32 id = 1;
  bytes ical = 2;
}

message MergeResponse {}

message ReplaceRequest {
  int32 id = 1;
  bytes ical = 2;
}

message ReplaceResponse {}

message UpdateMetadataRequest {
  int32 id = 1;
  optional string name = 2;
  optional bool members_only = 3;
  optional string description = 4;
  optional string color = 5;
}

message UpdateMetadataResponse {}

message UpdateSubscribedMetadataRequest {
  int32 id = 1;
  optional string color = 2;
}

message UpdateSubscribedMetadataResponse {}

message DeleteRequest {
  int32 id = 1;
}

message DeleteResponse {}

message CreateCodeRequest {
  int32 id = 1;
  string code = 2;
  optional google.protobuf.Duration ttl = 3;
}

message CreateCodeResponse {}

message GetCodeMetadataRequest {
  int32 code_id = 1;
}

message GetCodeMetadataResponse {
  int32 calendar_id = 1;
  string code = 2;
  optional google.protobuf.Timestamp expires_at = 3;
}

message GetCodesRequest {
  int32 id = 1;
}

message GetCodesResponse {
  repeated int32 code_ids = 1;
}

message DeleteCodeRequest {
  int32 code_id = 1;
}

message DeleteCodeResponse {}

message SubscribeRequest {
  string code = 1;
}

message SubscribeResponse {}

message UnsubscribeRequest {
  int32 id = 1;
}

message UnsubscribeResponse {}

message GetMembersRequest {
  int32 id = 1;
}

message GetMembersResponse {
  repeated int32 user_ids = 1;
}

message RemoveMemberRequest {
  int32 id = 1;
  int32 user_id = 2;
}

message RemoveMemberResponse {}

message BanMemberRequest {
  int32 id = 1;
  int32 user_id = 2;
  string reason = 3;
  optional google.protobuf.Duration ttl = 4;
}

message BanMemberResponse {}

message GetBannedMembersRequest {
  int32 id = 1;
}

message GetBannedMembersResponse {
  repeated int32 user_ids = 1;
}

message UnbanMemberRequest {
  int32 id = 1;
  int32 user_id = 2;
}

message UnbanMemberResponse {}
